name: Deploy to ECS Express Mode

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: golframe
  ECS_CLUSTER: golframe
  ECS_SERVICE: golframe

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Deploy to ECS Express Mode
        uses: aws-actions/amazon-ecs-deploy-express-service@v1
        with:
          service-name: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          image: ${{ steps.build-image.outputs.image }}
          execution-role-arn: ${{ secrets.AWS_EXECUTION_ROLE_ARN }}
          infrastructure-role-arn: ${{ secrets.AWS_INFRASTRUCTURE_ROLE_ARN }}
          task-role-arn: ${{ secrets.AWS_TASK_ROLE_ARN }}
          container-port: 8000
          cpu: "1024"
          memory: "2048"
          health-check-path: /api/health
          environment-variables: |
            [
              {"name": "ROBOFLOW_API_KEY", "value": "${{ secrets.ROBOFLOW_API_KEY }}"},
              {"name": "DATABASE_URL", "value": "${{ secrets.DATABASE_URL }}"},
              {"name": "S3_BUCKET_NAME", "value": "${{ secrets.S3_BUCKET_NAME }}"},
              {"name": "AWS_REGION", "value": "${{ env.AWS_REGION }}"},
              {"name": "BASIC_AUTH_USER", "value": "${{ secrets.BASIC_AUTH_USER }}"},
              {"name": "BASIC_AUTH_PASS", "value": "${{ secrets.BASIC_AUTH_PASS }}"}
            ]
